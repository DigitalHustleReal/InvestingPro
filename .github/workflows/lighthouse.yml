name: Lighthouse CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # Run weekly on Monday at 9 AM UTC
    - cron: '0 9 * * 1'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse CI against live site
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://investingpro.in
            https://investingpro.in/credit-cards
            https://investingpro.in/mutual-funds
            https://investingpro.in/calculators/sip
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Lighthouse CI completed
        run: echo "Lighthouse CI scan completed"
