name: Lighthouse CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 9 * * 1' # Weekly Monday 9 AM UTC

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            https://investingpro.in
            https://investingpro.in/credit-cards
            https://investingpro.in/mutual-funds
            https://investingpro.in/calculators/sip
            https://investingpro.in/glossary
            https://investingpro.in/blog
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
