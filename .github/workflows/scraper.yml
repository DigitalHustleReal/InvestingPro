name: Data Scraper Pipeline

on:
  schedule:
    # Run daily at 2:00 AM IST (8:30 PM UTC previous day)
    - cron: '30 20 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  scrape-products:
    runs-on: ubuntu-latest
    name: Scrape Products
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd lib/scraper
          pip install -r requirements.txt
      
      - name: Run product scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd lib/scraper
          python3 product_scraper.py
  
  scrape-reviews:
    runs-on: ubuntu-latest
    name: Process Reviews
    needs: scrape-products
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd lib/scraper
          pip install -r requirements.txt
      
      - name: Run review processor
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd lib/scraper
          python3 review_processor.py
  
  scrape-rates:
    runs-on: ubuntu-latest
    name: Scrape Financial Rates
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd lib/scraper
          pip install -r requirements.txt
      
      - name: Run rate scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd lib/scraper
          python3 rate_scraper.py

